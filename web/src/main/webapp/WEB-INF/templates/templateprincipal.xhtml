<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="jakarta.faces.facelets"
      	xmlns:f="jakarta.faces.core"
      	xmlns:h="jakarta.faces.html"
		xmlns:p="http://primefaces.org/ui">

<h:head>
	<h:outputStylesheet name="primeicons/primeicons.css"
		library="primefaces" />
	<link
		href="#{facesContext.externalContext.requestContextPath}/resources/css/bootstrap.min.css"
		rel="stylesheet" type="text/css" />
	<link
		href="#{facesContext.externalContext.requestContextPath}/resources/css/estilos.css"
		rel="stylesheet" type="text/css" />

	<script
		src="#{facesContext.externalContext.requestContextPath}/resources/js/bootstrap.min.js"></script>
	<script type="text/javascript"
		src="#{request.contextPath}/js/calendario/calendar_es.js"></script>
	<script type="text/javascript"
		src="#{facesContext.externalContext.requestContextPath}/resources/js/atras.js"></script>
	<script type="text/javascript"
		src="#{request.contextPath}/resources/js/pdfmake.min.js"></script>
	<script type="text/javascript"
		src="#{request.contextPath}/resources/js/vfs_fonts.js"></script>	
	<h:outputStylesheet library="webjars"
		name="primeflex/2.0.0/primeflex.min.css" />
	<h:outputStylesheet library="webjars"
		name="font-awesome/5.12.0/css/all.min-jsf.css" />
	<h:outputStylesheet library="webjars"
		name="font-awesome/5.12.0/css/v4-shims.min-jsf.css" />
	<style type="text/css">
.inscrito {
	background-color: #40e577 !important;
	background-image: none !important;
	color: #ffffff !important;
}

.abandonado {
	background-color: #f28b65 !important;
	background-image: none !important;
	color: #ffffff !important;
}

.candidato {
	background-color: #11ddcc !important;
	background-image: none !important;
	color: #ffffff !important;
}

.otraocasion {
	background-color: #FFAB68 !important;
	background-image: none !important;
	color: #ffffff !important;
}
.colorDesertado{
	background-color:#fc3755 !important;	
}
.colorMatriculado{
	background-color:#24d80d !important;	
}
.colorCulminado{
	background-color:#116FBF !important;	
}
/*-------------------*/
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
}

/* TOPBAR */
.topbar {
    height: 60px;
    background: #0d6efd;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    justify-content: space-between;
}

.toggle-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 60px;
    left: 0;
    width: 250px;
    height: calc(100% - 60px);
    background: #1f2d3d;
    padding: 15px;
    transition: all 0.3s ease;
    overflow-y: auto;
}

/* Colapsado */
.sidebar.collapsed {
    width: 70px;
}

/* CONTENT */
.content {
    margin-left: 250px;
    padding: 20px;
    margin-top: 60px;
    transition: all 0.3s ease;
}

/* Cuando colapsa */
.content.expanded {
    margin-left: 70px;
}

.logout-container {
    margin-top: 20px;
}
</style>
	<meta name="viewport"
		content="width=device-width,initial-scale=1,shrink-to-fit=no" />
		
</h:head>
<script>
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        var content = document.getElementById("content");

        sidebar.classList.toggle("collapsed");
        content.classList.toggle("expanded");
    }
</script>
<body>
	<h:form id="logoutForm">
		<p:dialog widgetVar="dlgCerrar" appendTo="@parent"
			header="#{titulos['salirSistema']}" modal="true" width="200px;"
			closable="false">
			<h:panelGrid columns="2">
				<p:commandButton value="#{botones['aceptar']}"
					icon="#{botones['icono.select']}" process="@this"
					partialSubmit="true" action="#{backingLogin.cerrarSesion()}"
					oncomplete="PF('dlgCerrar').hide();" />
				<p:commandButton value="#{botones['cancelar']}"
					icon="#{botones['icono.cancelar']}" process="@this"
					partialSubmit="true" oncomplete="PF('dlgCerrar').hide();" />
			</h:panelGrid>
		</p:dialog>
    </h:form>
        <!-- 🔵 TOP BAR -->
        <div class="topbar">
            <button type="button" class="toggle-btn" onclick="toggleSidebar()">
                <i class="pi pi-bars"></i>
            </button>

            <div class="user-info">
                <i class="pi pi-user"></i>
                #{backingLogin.beanLogin.usuario.persona.persApellidos}
                #{backingLogin.beanLogin.usuario.persona.persNombres}
            </div>
        </div>

        <!-- 🔵 SIDEBAR -->
        <div id="sidebar" class="sidebar">
            <p:panelMenu model="#{backingLogin.menumodel}" style="width:100%" />

            <div class="logout-container">
            	<h:form>
	                <p:commandButton 
	                    value="Cerrar sesión"
	                    icon="pi pi-sign-out"
	                    styleClass="ui-button-danger w-100"
	                    oncomplete="PF('dlgCerrar').show();"
	                    process="@this"/>
               </h:form>     
            </div>
        </div>

        <!-- 🟢 CONTENT -->
        <div id="content" class="content">
            <ui:insert name="contenido">
                Contenido por defecto...
            </ui:insert>
        </div>



</body>
</html>
